name: Sync Repository

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'config.json'
      - '.github/workflows/sync-repo.yml'
      - 'scripts/**'
      - '.github/actions/**'
  schedule:
    - cron: '15 1 * * 1'
  workflow_dispatch:
    inputs:
      force_full_rebuild:
        description: 'Force a full rebuild of all packages'
        required: false
        type: boolean
        default: false

permissions:
  packages: write
  contents: write

concurrency:
  group: "repo-sync"
  cancel-in-progress: false 

jobs:
  key-management:
    runs-on: ubuntu-latest
    outputs:
      enc-gpg: ${{ steps.config.outputs.enc-gpg }}
      pub-gpg: ${{ steps.config.outputs.pub-gpg }}
      email: ${{ steps.config.outputs.email }}
      name: ${{ steps.config.outputs.name }}
      repo-name: ${{ steps.config.outputs.repo-name }}
      packager: ${{ steps.config.outputs.packager }}
      key_updated: ${{ steps.manage_key.outputs.key_updated }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      
      - id: config
        uses: ./.github/actions/load-config

      - name: Manage GPG Key
        id: manage_key
        env:
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          chmod +x scripts/manage-key.sh
          ./scripts/manage-key.sh

  change-detection:
    runs-on: ubuntu-latest
    needs: key-management
    outputs:
      added_or_modified: ${{ steps.filter.outputs.added_or_modified }}
      deleted: ${{ steps.filter.outputs.deleted }}
      run_build: ${{ steps.filter.outputs.run_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changes
        id: filter
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_FULL_REBUILD: ${{ github.event.inputs.force_full_rebuild }}
          KEY_UPDATED: ${{ needs.key-management.outputs.key_updated }}
        run: |
          chmod +x scripts/detect-changes.sh
          ./scripts/detect-changes.sh

  build-packages:
    runs-on: ubuntu-latest
    needs: [key-management, change-detection]
    if: needs.change-detection.outputs.run_build == 'true' && needs.change-detection.outputs.added_or_modified != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.change-detection.outputs.added_or_modified) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and Sign Package
        uses: ./.github/actions/archlinux
        env:
          PACKAGER: ${{ needs.key-management.outputs.packager }}
          SECRET: ${{ secrets.ENCRYPTION_KEY }}
          GPGKEY: ${{ needs.key-management.outputs.enc-gpg }}
        with:
          dir: packages/${{ matrix.package }}
          run: makepkg -sr --sign -C -c --noconfirm --noprogressbar

      - name: Upload Package Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-packages-${{ matrix.package }}
          path: |
            packages/${{ matrix.package }}/*.pkg.tar.zst
            packages/${{ matrix.package }}/*.pkg.tar.zst.sig
          if-no-files-found: error
          retention-days: 1

  publish:
    runs-on: ubuntu-latest
    needs: [key-management, change-detection, build-packages]
    if: always() && (needs.change-detection.outputs.run_build == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download all built artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: built-packages-*

      - name: Download current database from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO_NAME=$(jq -r '.repo_name // "rodrigost23"' config.json)
          gh release download repository -p "${REPO_NAME}.db*" --repo "$GITHUB_REPOSITORY" || echo "No existing DB found."
          cp artifacts/*/*.pkg.tar.zst* . || true
          chmod +x scripts/update-repo.sh scripts/cleanup-release.sh

      - name: Update Database Index
        uses: ./.github/actions/archlinux
        env:
          DELETED_PACKAGES: ${{ needs.change-detection.outputs.deleted }}
          SECRET: ${{ secrets.ENCRYPTION_KEY }}
          GPGKEY: ${{ needs.key-management.outputs.enc-gpg }}
          REPO_NAME: ${{ needs.key-management.outputs.repo-name }}
        with:
          dir: .
          run: ./scripts/update-repo.sh

      - name: Cleanup old release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/cleanup-release.sh

      - name: Upload updated database and new packages
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: repository
          file: "*"
          file_glob: true
          overwrite: true
